<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PollenStudio - AI Variation Gallery</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; scroll-behavior: smooth; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const APP_KEY = 'pk_kXullfY59GGZhTNF'; 
        const REDIRECT_URL = window.location.origin + window.location.pathname;

        function App() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('pollen_key'));
            const [prompt, setPrompt] = useState('');
            const [loading, setLoading] = useState(false);
            const [history, setHistory] = useState(JSON.parse(localStorage.getItem('pollen_history') || '[]'));

            useEffect(() => {
                const hash = window.location.hash;
                if (hash.includes('api_key=')) {
                    const params = new URLSearchParams(hash.slice(1));
                    const key = params.get('api_key');
                    if (key) {
                        localStorage.setItem('pollen_key', key);
                        setApiKey(key);
                        window.history.replaceState(null, null, window.location.pathname);
                    }
                }
            }, []);

            const generateImages = async () => {
                if (!prompt || loading) return;
                setLoading(true);
                const styles = [
                    "3D Pixar style, cinematic lighting, vibrant colors, ",
                    "Hyper-realistic digital art, unreal engine 5, intricate details, ",
                    "Whimsical watercolor illustration, soft pastel colors, "
                ];

                try {
                    // Generate permanent URLs
                    const urls = styles.map((stylePrefix) => {
                        const fullPrompt = (stylePrefix + prompt).trim();
                        const seed = Math.floor(Math.random() * 1000000);
                        return `https://gen.pollinations.ai/image/${encodeURIComponent(fullPrompt)}?width=1024&height=1024&seed=${seed}&model=flux&nologo=true`;
                    });

                    // We "ping" the URLs once with the API key to trigger the paid generation
                    await Promise.all(urls.map(url => 
                        fetch(url, { headers: { 'Authorization': `Bearer ${apiKey}` } })
                    ));

                    const newEntry = { id: Date.now(), prompt, images: urls };
                    const updated = [newEntry, ...history];
                    setHistory(updated);
                    localStorage.setItem('pollen_history', JSON.stringify(updated));
                    setPrompt('');
                } catch (err) {
                    alert("Generation failed. Check your Pollen balance!");
                } finally {
                    setLoading(false);
                }
            };

            const downloadImage = async (url, originalPrompt, index) => {
                try {
                    const response = await fetch(url, { headers: { 'Authorization': `Bearer ${apiKey}` } });
                    const blob = await response.blob();
                    const link = document.createElement('a');
                    link.href = window.URL.createObjectURL(blob);
                    const cleanName = originalPrompt.replace(/[^\w\s]/gi, '').replace(/\s+/g, '-').slice(0, 30);
                    link.download = `${cleanName || 'ai-art'}-v${index + 1}.png`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } catch (err) {
                    alert("Download failed.");
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="flex justify-between items-center mb-12 max-w-6xl mx-auto">
                        <h1 className="text-2xl font-bold flex items-center gap-2">🌼 PollenStudio</h1>
                        {apiKey && <button onClick={() => {localStorage.clear(); setApiKey(null);}} className="text-gray-400 hover:text-white transition text-sm">Logout</button>}
                    </header>

                    {!apiKey ? (
                        <div className="text-center py-20 animate-fadeIn">
                            <h2 className="text-5xl font-black mb-6">Triple Your Creativity.</h2>
                            <button onClick={() => window.location.href = `https://enter.pollinations.ai/authorize?redirect_url=${REDIRECT_URL}&app_key=${APP_KEY}`} className="bg-yellow-400 text-black px-10 py-4 rounded-full font-bold shadow-2xl">Connect Pollinations</button>
                        </div>
                    ) : (
                        <div className="max-w-6xl mx-auto">
                            <div className="glass p-6 rounded-3xl mb-16 flex flex-col md:flex-row gap-4 shadow-2xl">
                                <input className="flex-1 bg-transparent border border-gray-700 rounded-2xl px-6 py-4 focus:border-yellow-400 text-lg" placeholder="A futuristic city..." value={prompt} onChange={(e) => setPrompt(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && generateImages()} />
                                <button onClick={generateImages} disabled={loading} className="bg-blue-600 px-8 py-4 rounded-2xl font-bold flex items-center justify-center gap-3">
                                    {loading ? 'Creating...' : '✨ Create 3 Variations'}
                                </button>
                            </div>
                            <div className="space-y-12">
                                {history.map(item => (
                                    <div key={item.id} className="glass p-8 rounded-[2.5rem] animate-fadeIn">
                                        <p className="text-sm text-gray-400 mb-6 font-mono tracking-wider">PROMPT: {item.prompt}</p>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                            {item.images.map((url, i) => (
                                                <div key={i} className="relative group overflow-hidden rounded-3xl aspect-square shadow-2xl bg-slate-800">
                                                    <img src={url} className="w-full h-full object-cover group-hover:scale-110 transition duration-700" alt="AI Art" />
                                                    <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-all duration-300 flex flex-col items-center justify-center gap-4">
                                                        <button onClick={() => downloadImage(url, item.prompt, i)} className="bg-white text-black px-6 py-2 rounded-xl font-bold text-sm hover:bg-yellow-400 transition transform translate-y-4 group-hover:translate-y-0">📥 Save Image</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
